<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | ExoticDrive</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        body {
            padding: 50px;
        }

        .admin-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #333;
            color: #fff;
        }

        .booking-list {
            margin-top: 40px;
        }

        .booking-item {
            padding: 10px;
            border-bottom: 1px solid #222;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Admin Dashboard</h1>

        <div class="admin-card">
            <h2>Create New Page</h2>
            <form id="page-form">
                <input type="text" id="page-title" placeholder="Page Title" required>
                <input type="text" id="page-price" placeholder="Price (e.g. $1,200)">
                <textarea id="page-content" placeholder="Page Content (HTML support)" rows="5" required></textarea>
                <button type="submit" class="btn">Create Page</button>
            </form>
        </div>

        <div class="admin-card" style="margin-top: 40px;">
            <h2>Existing Pages</h2>
            <div id="pages-list" style="margin-top: 20px;"></div>
        </div>

        <div class="booking-list">
            <h2>Recent Bookings</h2>
            <div id="bookings-container"></div>
        </div>
    </div>

    <script>
        document.getElementById('page-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('page-title').value;
            const price = document.getElementById('page-price').value;
            const content = document.getElementById('page-content').value;

            const res = await fetch('/api/pages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, price, content })
            });

            if (res.ok) {
                alert('Page created!');
                document.getElementById('page-form').reset();
                loadPages();
            }
        });

        async function loadPages() {
            const res = await fetch('/api/pages');
            const pages = await res.json();
            const container = document.getElementById('pages-list');
            container.innerHTML = pages.map(p => `
                <div class="booking-item" style="display: flex; justify-content: space-between; align-items: center;">
                    <span><strong>${p.title}</strong></span>
                    <button onclick="deletePage(${p.id})" style="background: red; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Delete</button>
                </div>
            `).join('');
        }

        async function deletePage(id) {
            if (!confirm('Are you sure you want to delete this page?')) return;
            const res = await fetch(`/api/pages/${id}`, { method: 'DELETE' });
            if (res.ok) {
                loadPages();
            }
        }

        async function loadBookings() {
            const res = await fetch('/api/bookings-list');
            const bookings = await res.json();
            const container = document.getElementById('bookings-container');
            container.innerHTML = bookings.map(b => `
                <div class="booking-item">
                    <strong>${b.name}</strong> (${b.email}) reserved <strong>${b.car}</strong> for ${b.date}
                </div>
            `).join('');
        }

        loadPages();
        loadBookings();
    </script>
</body>

</html>
